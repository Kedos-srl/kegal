site_name: KeGAL
site_url: https://kedos-srl.github.io/kegal
site_description: Graph-based agent framework for LLMs
repo_url: https://github.com/kedos-srl/kegal
repo_name: kedos-srl/kegal

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Graph Reference: graph_doc.md
  - LLM Providers: llm_doc.md
  - Tutorials:
    - Overview: tutorials.md
    - 01 - Message passing: tutorials/01_message_passing.md
    - 02 - Structured output: tutorials/02_structured_output.md
    - 03 - Guard nodes: tutorials/03_guard_nodes.md
    - 04 - Fan-out and fan-in: tutorials/04_fan_out_fan_in.md
    - 05 - RAG: tutorials/05_rag.md
    - 06 - Chat history: tutorials/06_chat_history.md
    - 07 - Multimodal: tutorials/07_multimodal.md
    - 08 - Python tool executors: tutorials/08_tool_executors.md
    - 09 - MCP servers: tutorials/09_mcp_servers.md
    - 10 - Blackboard: tutorials/10_blackboard.md
    - 11 - Multi-provider graphs: tutorials/11_multi_provider.md
    - 12 - ReAct loop: tutorials/12_react_loop.md
    - 13 - Context window and outputs: tutorials/13_context_window.md
  - Changelog: CHANGELOG.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - admonition
  - attr_list
  - toc:
      permalink: true
