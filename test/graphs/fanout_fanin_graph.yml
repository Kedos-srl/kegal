# Fan-out + Fan-in graph
#
# Topology:
#   [dispatcher]
#       |  children (fan-out — parallel)
#   /              \
# [economic_analyst] [environmental_analyst]
#   \              /
#    fan_in → [synthesizer]
#
# Level 0: dispatcher
# Level 1: economic_analyst, environmental_analyst  (fan-out from dispatcher)
# Level 2: synthesizer                              (fan-in, waits for both analysts)

models:
  - llm: "ollama"
    model: "ministral-3:8b"
    host: "http://localhost:11434"

user_message: "What are the benefits of renewable energy?"

prompts:
  - template:
      system_template:
        role: |
          You are a task dispatcher. Acknowledge the request briefly.
      prompt_template:
        instruction: |
          Acknowledge receipt of this request in one sentence: "{user_message}"

  - template:
      system_template:
        role: |
          You are an economic analyst. Answer in one sentence only.
      prompt_template:
        instruction: |
          Name one economic benefit of: "{user_message}"

  - template:
      system_template:
        role: |
          You are an environmental analyst. Answer in one sentence only.
      prompt_template:
        instruction: |
          Name one environmental benefit of: "{user_message}"

  - template:
      system_template:
        role: |
          You are a synthesis expert. Combine insights into one concise sentence.
      prompt_template:
        instruction: |
          Synthesize the key benefits of "{user_message}" into one sentence.

nodes:
  - id: "dispatcher"
    model: 0
    temperature: 0.0
    max_tokens: 60
    show: true
    message_passing:
      input: false
      output: false
    prompt:
      template: 0
      user_message: true

  - id: "economic_analyst"
    model: 0
    temperature: 0.3
    max_tokens: 80
    show: true
    message_passing:
      input: false
      output: false
    prompt:
      template: 1
      user_message: true

  - id: "environmental_analyst"
    model: 0
    temperature: 0.3
    max_tokens: 80
    show: true
    message_passing:
      input: false
      output: false
    prompt:
      template: 2
      user_message: true

  - id: "synthesizer"
    model: 0
    temperature: 0.2
    max_tokens: 100
    show: true
    message_passing:
      input: false
      output: false
    prompt:
      template: 3
      user_message: true

edges:
  - node: "dispatcher"
    children:
      - node: "economic_analyst"
      - node: "environmental_analyst"
  - node: "synthesizer"
    fan_in:
      - node: "economic_analyst"
      - node: "environmental_analyst"
