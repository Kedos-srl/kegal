models:
  - llm: "ollama"
    model: "mistral-small3.2:latest"
    host: "http://localhost:11434"

mcp_servers:
  - id: "sqlite_server"
    transport: "stdio"
    command: "python"
    args: ["test/mcp_sqlite_server.py"]

user_message: "Analyse the revenue trend for each product across all quarters."

prompts:
  - template:
      system_template:
        role: |
          You are a data analyst. You have access to a sales database with a table
          called `sales` containing columns: id, product, quarter, revenue.
          Use the query_db tool to retrieve the data needed. Do not interpret or summarize — only fetch.
      prompt_template:
        instruction: |
          {user_message}

  - template:
      system_template:
        role: |
          You are a business analyst writing an executive summary.
      prompt_template:
        data: |
          Here is the raw sales data by product and quarter:
          {message_passing}
        instruction: |
          Write a concise trend analysis: which products are growing, declining, or stable across quarters?

nodes:
  - id: "query_node"
    model: 0
    temperature: 0.0
    max_tokens: 512
    show: true
    message_passing:
      input: false
      output: true
    mcp_servers: [0]
    prompt:
      template: 0
      user_message: true

  - id: "analyst_node"
    model: 0
    temperature: 0.3
    max_tokens: 1024
    show: true
    message_passing:
      input: true
      output: false
    prompt:
      template: 1

edges:
  - node: "query_node"
  - node: "analyst_node"
